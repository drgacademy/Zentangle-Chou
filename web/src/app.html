<!doctype html>
<html lang="zh-Hant" class="bg-paper text-ink antialiased">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&family=Caveat+Brush&family=Caveat:wght@400;600&family=Allura&family=Homemade+Apple&family=Noto+Serif+TC:wght@400;600;700&display=swap"
    />

    <script>
      // Theme bootstrap — runs before paint to avoid flash of wrong theme.
      (function () {
        try {
          const stored = localStorage.getItem('theme');
          const prefers = window.matchMedia('(prefers-color-scheme: dark)').matches;
          const dark = stored ? stored === 'dark' : prefers;
          if (dark) document.documentElement.classList.add('dark');
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="font-body">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
